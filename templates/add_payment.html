{% extends 'base.html' %}

{% block content %}

<h3>Record Payment</h3>

<form method="POST">

    <label>Tenant</label>
    <select name="tenant_id" class="form-control mb-3" required>
        <option value="">Select Tenant</option>
        {% for tenant in tenants %}
        <option value="{{ tenant[0] }}">{{ tenant[1] }}</option>
        {% endfor %}
    </select>

    <input type="number" name="amount" class="form-control mb-3" placeholder="Amount Paid" required>

    <input type="date" name="payment_date" class="form-control mb-3" required>

    <select name="payment_method" class="form-control mb-3">
        <option value="cash">Cash</option>
        <option value="mpesa">M-Pesa</option>
    </select>

    <input type="text" name="mpesa_code" class="form-control mb-3" placeholder="M-Pesa Code (optional)">

    <button class="btn btn-dark">Save Payment</button>

</form>

{% endblock %}
