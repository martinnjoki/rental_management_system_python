<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Account | Mbungu Properties</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                linear-gradient(rgba(0, 0, 0, .65), rgba(0, 0, 0, .65)),
                url("{{ url_for('static', filename='images/bilding-1.jpg') }}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            background: rgba(255, 255, 255, .95);
            padding: 35px;
            border-radius: 12px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 0 25px rgba(0, 0, 0, .25);
        }

        .brand {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: #dc3545;
        }

        .btn-main {
            background: #dc3545;
            color: white;
        }
    </style>
</head>

<body>

    <div class="card-box">

        <div class="brand">Mbungu Properties</div>
        <p class="text-center text-muted">Create your landlord account</p>

        <form method="POST">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-main w-100">Register</button>
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary w-100 mt-2">
                ← Back to Home
            </a>

        </form>

        <p class="text-center mt-3">
            Already have account?
            <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>

</body>

</html>
