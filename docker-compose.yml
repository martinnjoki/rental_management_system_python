version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile

    image: rental-management-web:latest
    container_name: rental_management_web

    ports:
      - "5050:5050"

    environment:
      SECRET_KEY: change-this-in-production
      DB_PATH: /data/rental_system.db
      FLASK_DEBUG: "0"
      PORT: "5050"
      GUNICORN_WORKERS: "1"
      GUNICORN_TIMEOUT: "60"

    # FIX: use your local ./data folder instead of named volume
    volumes:
      - ./data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5050/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s